<mat-toolbar
  class="app-navbar navbar__root"
  [class.navbar__root--dark]="themeService.isDark()"
  [class.navbar__root--light]="!themeService.isDark()">
  <div class="navbar__backdrop"></div>
  <div class="navbar__border"></div>

  <div class="navbar__layout">
    <a
      class="app-brand navbar__brand"
      href="#hero"
      [class.navbar__brand--dark]="themeService.isDark()"
      [class.navbar__brand--light]="!themeService.isDark()">
      {{ brand }}
    </a>

    <nav
      aria-label="Primary navigation"
      class="app-nav-surface navbar__nav"
      [class.navbar__nav--dark]="themeService.isDark()"
      [class.navbar__nav--light]="!themeService.isDark()">
      @for (link of links; track link.label) {
        <a
          mat-button
          class="app-nav-link navbar__nav-link"
          [class.navbar__nav-link--dark]="themeService.isDark()"
          [class.navbar__nav-link--light]="!themeService.isDark()"
          [href]="link.href">
          {{ link.label }}
        </a>
      }
    </nav>

    <button
      mat-icon-button
      class="app-theme-toggle navbar__theme-toggle"
      type="button"
      [class.navbar__theme-toggle--dark]="themeService.isDark()"
      [class.navbar__theme-toggle--light]="!themeService.isDark()"
      [attr.aria-label]="themeService.toggleLabel()"
      [matTooltip]="themeService.toggleLabel()"
      (click)="toggleTheme()">
      <mat-icon>{{ themeService.toggleIcon() }}</mat-icon>
    </button>

    <button
      mat-icon-button
      class="app-menu-toggle navbar__menu-toggle"
      type="button"
      aria-label="Open navigation menu"
      [class.navbar__menu-toggle--dark]="themeService.isDark()"
      [class.navbar__menu-toggle--light]="!themeService.isDark()"
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="openMobileMenu()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>
</mat-toolbar>

<app-mobile-navbar [brand]="brand" [links]="links" [isOpen]="isMobileMenuOpen()" (closed)="closeMobileMenu()" />
