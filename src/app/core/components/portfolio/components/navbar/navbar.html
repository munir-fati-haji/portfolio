<mat-toolbar class="app-navbar navbar__root">
  <div class="navbar__backdrop"></div>
  <div class="navbar__border"></div>

  <div class="navbar__layout">
    <a class="app-brand navbar__brand" routerLink="/">
      {{ brand }}
    </a>

    <nav aria-label="Primary navigation" class="app-nav-surface navbar__nav">
      @for (link of links; track link.label) {
        <a mat-button class="app-nav-link navbar__nav-link" [routerLink]="link.route">
          {{ link.label }}
        </a>
      }
    </nav>

    <button
      mat-icon-button
      class="app-theme-toggle navbar__theme-toggle"
      type="button"
      [attr.aria-label]="themeService.toggleLabel()"
      [matTooltip]="themeService.toggleLabel()"
      (click)="toggleTheme()">
      <mat-icon>{{ themeService.toggleIcon() }}</mat-icon>
    </button>

    <button
      mat-icon-button
      class="app-menu-toggle navbar__menu-toggle"
      type="button"
      aria-label="Open navigation menu"
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="openMobileMenu()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>
</mat-toolbar>

<app-mobile-navbar [brand]="brand" [links]="links" [isOpen]="isMobileMenuOpen()" (closed)="closeMobileMenu()" />
