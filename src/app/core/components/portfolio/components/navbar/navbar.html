<mat-toolbar class="navbar__root">
  <div class="navbar__layout">
    <button mat-button class="navbar__brand" type="button" routerLink="/" aria-label="Go to home">
      {{ brand }}
    </button>

    <nav aria-label="Primary navigation" class="navbar__nav">
      @for (link of links; track link.label) {
        <button mat-flat-button class="navbar__nav-link" type="button" [routerLink]="link.route">
          {{ link.label }}
        </button>
      }
    </nav>

    <button
      mat-icon-button
      class="navbar__theme-toggle"
      type="button"
      [attr.aria-label]="themeService.toggleLabel()"
      [matTooltip]="themeService.toggleLabel()"
      (click)="toggleTheme()">
      <mat-icon>{{ themeService.toggleIcon() }}</mat-icon>
    </button>

    <button
      mat-icon-button
      class="navbar__menu-toggle"
      type="button"
      aria-label="Open navigation menu"
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="openMobileMenu()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>
</mat-toolbar>

<app-mobile-navbar [brand]="brand" [links]="links" [isOpen]="isMobileMenuOpen()" (closed)="closeMobileMenu()" />
