<mat-toolbar class="navbar__root">
  <div class="navbar__layout">
    <button mat-stroked-button class="navbar__brand" type="button" routerLink="/" aria-label="Go to home">
      {{ brand }}
    </button>

    <nav aria-label="Primary navigation" class="navbar__nav">
      @for (link of links; track link.label) {
        <button
          mat-stroked-button
          class="navbar__nav-link"
          routerLinkActive="navbar__nav-link--active"
          type="button"
          [routerLinkActiveOptions]="{ exact: link.route === '/' }"
          [routerLink]="link.route">
          {{ link.label }}
        </button>
      }
    </nav>

    <button
      mat-icon-button
      class="navbar__theme-toggle"
      type="button"
      [attr.aria-label]="themeService.toggleLabel()"
      [matTooltip]="themeService.toggleLabel()"
      (click)="toggleTheme()">
      <mat-icon>{{ themeService.toggleIcon() }}</mat-icon>
    </button>
  </div>
</mat-toolbar>

<app-mobile-navbar [links]="links" />
