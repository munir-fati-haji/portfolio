<mat-toolbar
  class="h-auto! min-h-0! border-b border-slate-200 bg-white/95! px-3! py-2! text-slate-700! shadow-sm backdrop-blur sm:px-5!">
  <div class="mx-auto flex w-full max-w-6xl items-center justify-between gap-4">
    <a
      class="font-['Brush_Script_MT','Segoe_Script',cursive] text-2xl font-normal tracking-normal text-slate-950 no-underline sm:text-3xl"
      href="#hero">
      {{ brand }}
    </a>

    <nav aria-label="Primary navigation" class="hidden items-center gap-1 sm:flex">
      @for (link of links; track link.label) {
        <a mat-button class="h-8! min-w-0! px-3! text-xs! leading-none!" [href]="link.href"> {{ link.label }} </a>
      }
    </nav>

    <button
      mat-icon-button
      class="h-9! w-9! sm:hidden!"
      type="button"
      aria-label="Open navigation menu"
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="openMobileMenu()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>
</mat-toolbar>

<app-mobile-navbar [brand]="brand" [links]="links" [isOpen]="isMobileMenuOpen()" (closed)="closeMobileMenu()" />
