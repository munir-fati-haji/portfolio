<mat-toolbar
  class="app-navbar relative z-40 h-16! min-h-16! overflow-hidden border-b px-3! py-0! shadow-[0_12px_36px_rgba(0,0,0,0.24)] backdrop-blur-xl sm:px-5!"
  [class]="
    themeService.isDark()
      ? 'border-white/10 bg-[#070b1a]/80! text-white!'
      : 'border-slate-200/80 bg-slate-50/90! text-slate-950!'
  ">
  <div
    class="pointer-events-none absolute -left-16 top-1/2 h-28 w-28 -translate-y-1/2 rounded-full bg-cyan-300/10 blur-3xl"></div>
  <div class="pointer-events-none absolute right-20 top-0 h-20 w-20 rounded-full bg-blue-500/10 blur-3xl"></div>

  <div class="relative mx-auto flex w-full max-w-7xl items-center justify-between gap-4">
    <a
      class="app-brand rounded-full px-2 font-['Brush_Script_MT','Segoe_Script',cursive] text-2xl font-normal tracking-normal no-underline transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-cyan-300 sm:text-3xl"
      href="#hero"
      [class]="themeService.isDark() ? 'text-white hover:text-cyan-200' : 'text-slate-950 hover:text-cyan-700'">
      {{ brand }}
    </a>

    <nav
      aria-label="Primary navigation"
      class="app-nav-surface hidden items-center gap-0.5 rounded-full border p-1 shadow-lg shadow-black/10 backdrop-blur xl:flex"
      [class]="themeService.isDark() ? 'border-white/10 bg-white/[0.045]' : 'border-slate-200 bg-white/80'">
      @for (link of links; track link.label) {
        <a
          mat-button
          class="app-nav-link h-9! min-w-0! rounded-full! px-3! text-xs! font-semibold! leading-none! transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-300"
          [class]="
            themeService.isDark()
              ? 'text-slate-300! hover:bg-cyan-300/10! hover:text-cyan-200!'
              : 'text-slate-700! hover:bg-cyan-100! hover:text-cyan-700!'
          "
          [href]="link.href">
          {{ link.label }}
        </a>
      }
    </nav>

    <button
      mat-icon-button
      class="app-theme-toggle hidden! h-10! w-10! rounded-full! border shadow-lg transition xl:inline-flex!"
      type="button"
      [class]="
        themeService.isDark()
          ? 'border-white/20! bg-white/90! text-slate-950! shadow-black/30 hover:bg-white!'
          : 'border-slate-950/15! bg-slate-950! text-white! shadow-slate-300/40 hover:bg-slate-800!'
      "
      [attr.aria-label]="themeService.toggleLabel()"
      [matTooltip]="themeService.toggleLabel()"
      (click)="toggleTheme()">
      <mat-icon>{{ themeService.toggleIcon() }}</mat-icon>
    </button>

    <button
      mat-icon-button
      class="app-menu-toggle h-10! w-10! rounded-full! border shadow-lg transition xl:hidden!"
      type="button"
      aria-label="Open navigation menu"
      [class]="
        themeService.isDark()
          ? 'border-cyan-300/20! bg-cyan-300/10! text-cyan-200! shadow-cyan-950/30 hover:bg-cyan-300/15!'
          : 'border-cyan-600/20! bg-cyan-50! text-cyan-700! shadow-slate-300/40 hover:bg-cyan-100!'
      "
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="openMobileMenu()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>
</mat-toolbar>

<app-mobile-navbar [brand]="brand" [links]="links" [isOpen]="isMobileMenuOpen()" (closed)="closeMobileMenu()" />
