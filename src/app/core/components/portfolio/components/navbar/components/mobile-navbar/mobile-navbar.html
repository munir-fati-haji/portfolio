@if (isOpen()) {
  <div class="fixed inset-0 z-50 overflow-hidden xl:hidden">
    <button
      class="absolute inset-0 bg-[#030712]/70 backdrop-blur-md"
      type="button"
      aria-label="Close navigation menu"
      (click)="close()"></button>

    <aside
      class="app-mobile-drawer absolute inset-y-0 right-0 flex w-[calc(100vw-1.5rem)] max-w-sm flex-col overflow-hidden rounded-l-3xl border-l p-4 shadow-2xl backdrop-blur-2xl"
      [ngClass]="
        themeService.isDark()
          ? 'border-white/10 bg-[#070b1a]/90 text-white shadow-black/40'
          : 'border-slate-200 bg-slate-50/95 text-slate-950 shadow-slate-400/30'
      ">
      <div class="pointer-events-none absolute -right-14 top-10 h-36 w-36 rounded-full bg-cyan-300/15 blur-3xl"></div>
      <div class="pointer-events-none absolute -bottom-10 left-8 h-40 w-40 rounded-full bg-blue-500/10 blur-3xl"></div>

      <div class="relative flex items-center justify-between gap-3">
        <a
          class="app-brand rounded-full px-2 font-['Brush_Script_MT','Segoe_Script',cursive] text-2xl font-normal no-underline transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-cyan-300"
          href="#hero"
          [ngClass]="themeService.isDark() ? 'text-white hover:text-cyan-200' : 'text-slate-950 hover:text-cyan-700'"
          (click)="close()">
          {{ brand() }}
        </a>

        <button
          mat-icon-button
          class="h-10! w-10! rounded-full! border transition"
          type="button"
          aria-label="Close navigation menu"
          [ngClass]="
            themeService.isDark()
              ? 'border-cyan-300/20! bg-cyan-300/10! text-cyan-200! hover:bg-cyan-300/15!'
              : 'border-cyan-600/20! bg-cyan-50! text-cyan-700! hover:bg-cyan-100!'
          "
          (click)="close()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <nav aria-label="Mobile navigation" class="relative mt-8 flex min-h-0 flex-1 flex-col gap-2 overflow-y-auto pb-4">
        @for (link of links(); track link.label) {
          <a
            mat-button
            class="app-mobile-nav-link h-12! justify-start! rounded-2xl! border px-4! text-sm! font-semibold! transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-300"
            [ngClass]="
              themeService.isDark()
                ? 'border-white/10! bg-white/[0.045]! text-slate-200! hover:border-cyan-300/20! hover:bg-cyan-300/10! hover:text-cyan-100!'
                : 'border-slate-200! bg-white/80! text-slate-700! hover:border-cyan-500/30! hover:bg-cyan-50! hover:text-cyan-700!'
            "
            [href]="link.href"
            (click)="close()">
            <mat-icon class="mr-3! text-[1.25rem]! text-cyan-300!" aria-hidden="true">{{ link.icon }}</mat-icon>
            {{ link.label }}
          </a>
        }
      </nav>

      <div class="relative mt-auto border-t border-white/10 pt-4">
        <button
          type="button"
          class="app-mobile-theme-toggle mb-4 flex h-12 w-full items-center justify-between rounded-2xl border px-4 text-left text-sm font-semibold transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-300"
          [ngClass]="
            themeService.isDark()
              ? 'border-white/20 bg-white/90 text-slate-950 hover:bg-white'
              : 'border-slate-950/15 bg-slate-950 text-white hover:bg-slate-800'
          "
          [attr.aria-label]="themeService.toggleLabel()"
          (click)="toggleTheme()">
          <span>{{ themeService.toggleLabel() }}</span>
          <mat-icon class="text-cyan-300!" aria-hidden="true">{{ themeService.toggleIcon() }}</mat-icon>
        </button>

        <p class="px-1 text-xs font-semibold uppercase tracking-[0.28em] text-cyan-300">Connect</p>

        <nav aria-label="Mobile footer links" class="mt-3 flex flex-wrap items-center gap-2">
          @for (link of footerLinks; track link.label) {
            <a
              class="app-footer-icon group inline-flex h-11 w-11 items-center justify-center rounded-full border shadow-lg transition hover:shadow-[0_0_22px_rgba(34,211,238,0.22)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300 focus-visible:ring-offset-2 focus-visible:ring-offset-[#070b1a]"
              [ngClass]="
                themeService.isDark()
                  ? 'border-white/15 bg-white/10 text-cyan-100 shadow-cyan-950/25 hover:border-cyan-300/35 hover:bg-cyan-300/15 hover:text-white'
                  : 'border-slate-200 bg-white text-cyan-700 shadow-slate-300/40 hover:border-cyan-500/30 hover:bg-cyan-50 hover:text-cyan-800'
              "
              [href]="link.href"
              [attr.aria-label]="link.label"
              [attr.target]="link.external ? '_blank' : null"
              [attr.rel]="link.external ? 'noreferrer' : null"
              (click)="close()">
              <mat-icon
                class="size-[19px]! text-current! opacity-95 transition group-hover:opacity-100 [&_*]:fill-current!"
                aria-hidden="true"
                [svgIcon]="link.icon" />
            </a>
          }
        </nav>
      </div>
    </aside>
  </div>
}
