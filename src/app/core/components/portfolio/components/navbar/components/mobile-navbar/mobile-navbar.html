@if (isOpen()) {
  <div class="mobile-navbar__style-1">
    <button class="mobile-navbar__style-2" type="button" aria-label="Close navigation menu" (click)="close()"></button>

    <aside
      class="app-mobile-drawer mobile-navbar__style-3"
      [class.mobile-navbar__style-3--dark]="themeService.isDark()"
      [class.mobile-navbar__style-3--light]="!themeService.isDark()">
      <div class="mobile-navbar__style-4"></div>
      <div class="mobile-navbar__style-5"></div>

      <div class="mobile-navbar__style-6">
        <a
          class="app-brand mobile-navbar__style-7"
          href="#hero"
          [class.mobile-navbar__style-7--dark]="themeService.isDark()"
          [class.mobile-navbar__style-7--light]="!themeService.isDark()"
          (click)="close()">
          {{ brand() }}
        </a>

        <button
          mat-icon-button
          class="mobile-navbar__style-8"
          type="button"
          aria-label="Close navigation menu"
          [class.mobile-navbar__style-8--dark]="themeService.isDark()"
          [class.mobile-navbar__style-8--light]="!themeService.isDark()"
          (click)="close()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <nav aria-label="Mobile navigation" class="mobile-navbar__style-9">
        @for (link of links(); track link.label) {
          <a
            mat-button
            class="app-mobile-nav-link mobile-navbar__style-10"
            [class.mobile-navbar__style-10--dark]="themeService.isDark()"
            [class.mobile-navbar__style-10--light]="!themeService.isDark()"
            [href]="link.href"
            (click)="close()">
            <mat-icon class="mobile-navbar__style-11" aria-hidden="true">{{ link.icon }}</mat-icon>
            {{ link.label }}
          </a>
        }
      </nav>

      <div class="mobile-navbar__style-12">
        <button
          type="button"
          class="app-mobile-theme-toggle mobile-navbar__style-13"
          [class.mobile-navbar__style-13--dark]="themeService.isDark()"
          [class.mobile-navbar__style-13--light]="!themeService.isDark()"
          [attr.aria-label]="themeService.toggleLabel()"
          (click)="toggleTheme()">
          <span>{{ themeService.toggleLabel() }}</span>
          <mat-icon class="mobile-navbar__style-14" aria-hidden="true">{{ themeService.toggleIcon() }}</mat-icon>
        </button>

        <p class="mobile-navbar__style-15">Connect</p>

        <nav aria-label="Mobile footer links" class="mobile-navbar__style-16">
          @for (link of footerLinks; track link.label) {
            <a
              class="app-footer-icon group mobile-navbar__style-17"
              [class.mobile-navbar__style-17--dark]="themeService.isDark()"
              [class.mobile-navbar__style-17--light]="!themeService.isDark()"
              [href]="link.href"
              [attr.aria-label]="link.label"
              [attr.target]="link.external ? '_blank' : null"
              [attr.rel]="link.external ? 'noreferrer' : null"
              (click)="close()">
              <mat-icon class="mobile-navbar__style-18" aria-hidden="true" [svgIcon]="link.icon" />
            </a>
          }
        </nav>
      </div>
    </aside>
  </div>
}
