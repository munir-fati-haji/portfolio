@if (isOpen()) {
  <div class="fixed inset-0 z-50 sm:hidden">
    <button
      class="absolute inset-0 bg-slate-950/20 backdrop-blur-sm"
      type="button"
      aria-label="Close navigation menu"
      (click)="close()"></button>

    <aside
      class="absolute inset-y-0 right-0 flex w-4/5 max-w-sm flex-col rounded-l-2xl bg-white p-4 text-slate-700 shadow-xl">
      <div class="flex items-center justify-between gap-3">
        <a
          class="font-['Brush_Script_MT','Segoe_Script',cursive] text-2xl font-normal text-slate-950 no-underline"
          href="#hero"
          (click)="close()">
          {{ brand() }}
        </a>

        <button mat-icon-button class="h-9! w-9!" type="button" aria-label="Close navigation menu" (click)="close()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <nav aria-label="Mobile navigation" class="mt-6 flex flex-col gap-1">
        @for (link of links(); track link.label) {
          <a
            mat-button
            class="h-11! justify-start! px-3! text-sm! font-medium! text-slate-700!"
            [href]="link.href"
            (click)="close()">
            <mat-icon class="mr-3! text-[1.25rem]!" aria-hidden="true">{{ link.icon }}</mat-icon>
            {{ link.label }}
          </a>
        }
      </nav>
    </aside>
  </div>
}
