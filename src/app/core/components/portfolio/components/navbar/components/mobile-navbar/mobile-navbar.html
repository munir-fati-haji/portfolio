@if (isOpen()) {
  <mat-drawer-container class="mobile-navbar__container" hasBackdrop="true">
    <mat-drawer class="mobile-navbar__drawer" mode="over" position="end" [opened]="isOpen()" (closedStart)="close()">
      <div class="mobile-navbar__drawer-header">
        <button mat-button class="mobile-navbar__brand" type="button" routerLink="/" (click)="close()">
          {{ brand() }}
        </button>

        <button mat-icon-button type="button" aria-label="Close navigation menu" (click)="close()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <mat-nav-list aria-label="Mobile navigation" class="mobile-navbar__nav-list">
        @for (link of links(); track link.label) {
          <button mat-list-item type="button" [routerLink]="link.route" (click)="close()">
            <mat-icon matListItemIcon aria-hidden="true">{{ link.icon }}</mat-icon>
            <span matListItemTitle>{{ link.label }}</span>
          </button>
        }
      </mat-nav-list>

      <mat-divider />

      <div class="mobile-navbar__nav-footer">
        <button
          mat-stroked-button
          type="button"
          class="mobile-navbar__theme-button"
          [attr.aria-label]="themeService.toggleLabel()"
          (click)="toggleTheme()">
          <mat-icon aria-hidden="true">{{ themeService.toggleIcon() }}</mat-icon>
          {{ themeService.toggleLabel() }}
        </button>

        <p class="mobile-navbar__connect-label">Connect</p>

        <div aria-label="Mobile footer links" class="mobile-navbar__social-list">
          @for (link of footerLinks; track link.label) {
            <button mat-icon-button type="button" [attr.aria-label]="link.label" (click)="openExternalUrl(link.href)">
              <mat-icon aria-hidden="true" [svgIcon]="link.icon" />
            </button>
          }
        </div>
      </div>
    </mat-drawer>
  </mat-drawer-container>
}
