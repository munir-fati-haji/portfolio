<mat-toolbar
  class="relative hidden! h-auto! min-h-0! overflow-hidden border-t border-white/10 bg-[#070b1a]! px-4! py-3! text-slate-400! shadow-[0_-12px_36px_rgba(0,0,0,0.22)] backdrop-blur-xl xl:flex!">
  <div
    class="pointer-events-none absolute left-1/2 top-0 h-16 w-44 -translate-x-1/2 -translate-y-1/2 rounded-full bg-cyan-300/10 blur-3xl"></div>

  <div
    class="relative mx-auto flex w-full max-w-7xl flex-col items-center justify-between gap-3 text-center text-xs leading-normal sm:flex-row sm:text-left">
    <span class="font-medium text-slate-400">
      {{ copyright }}
    </span>

    <nav
      aria-label="Footer links"
      class="flex items-center justify-center gap-1.5 rounded-full border border-white/10 bg-white/[0.06] p-1 shadow-[inset_0_1px_0_rgba(255,255,255,0.12),0_10px_24px_rgba(0,0,0,0.22)] backdrop-blur-xl">
      @for (link of links; track link.label) {
        <a
          class="group inline-flex h-9 w-9 items-center justify-center rounded-full border border-white/10 bg-white/[0.08] text-cyan-100 shadow-sm transition duration-200 hover:-translate-y-0.5 hover:border-cyan-300/50 hover:bg-cyan-300/20 hover:text-white hover:shadow-[0_0_20px_rgba(34,211,238,0.22)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300 focus-visible:ring-offset-2 focus-visible:ring-offset-[#070b1a]"
          [href]="link.href"
          [matTooltip]="link.label"
          [attr.aria-label]="link.label"
          [attr.target]="link.external ? '_blank' : null"
          [attr.rel]="link.external ? 'noreferrer' : null">
          <mat-icon
            class="size-[18px]! text-current! opacity-95 transition group-hover:opacity-100 [&_*]:fill-current!"
            aria-hidden="true"
            [svgIcon]="link.icon" />
        </a>
      }
    </nav>
  </div>
</mat-toolbar>
