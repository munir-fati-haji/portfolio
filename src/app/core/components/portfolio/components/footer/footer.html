<mat-toolbar
  class="h-auto! min-h-0! border-t border-slate-200 bg-white/95! px-3! py-1.5! text-slate-600! shadow-sm backdrop-blur sm:px-5!">
  <div
    class="mx-auto flex w-full max-w-6xl flex-col items-center justify-between gap-2 text-center text-xs leading-normal sm:flex-row sm:text-left">
    <span class="font-medium text-slate-700"> {{ copyright }} </span>

    <nav aria-label="Footer links" class="flex flex-wrap items-center justify-center gap-x-4 gap-y-1">
      @for (link of links; track link.label) {
        <a
          mat-button
          class="h-8! w-8! min-w-0! px-0! leading-none!"
          [href]="link.href"
          [matTooltip]="link.label"
          [attr.aria-label]="link.label"
          [attr.target]="link.external ? '_blank' : null"
          [attr.rel]="link.external ? 'noreferrer' : null">
          <mat-icon class="m-0! size-5!" aria-hidden="true" [svgIcon]="link.icon" />
        </a>
      }
    </nav>
  </div>
</mat-toolbar>
