<section class="under-construction__section">
  <div class="under-construction__content">
    <mat-card class="under-construction__card" appearance="outlined">
      <mat-card-content>
        <mat-chip-set aria-label="Page status">
          <mat-chip>Work in progress</mat-chip>
        </mat-chip-set>

        <mat-icon class="under-construction__icon"> construction </mat-icon>

        <h2 class="under-construction__title">{{ sectionName() }} is under construction</h2>

        <p class="under-construction__description">
          I am still working on the {{ sectionName() }} section. More content will be added soon.
        </p>
      </mat-card-content>
    </mat-card>
  </div>
</section>
