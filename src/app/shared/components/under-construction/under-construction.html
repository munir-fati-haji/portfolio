<section class="relative overflow-hidden bg-[#070b1a] px-4 py-24 text-white sm:px-6 lg:px-10 xl:px-12">
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-1/2 top-20 h-96 w-96 -translate-x-1/2 rounded-full bg-cyan-300/10 blur-3xl"></div>
    <div class="absolute bottom-0 right-[-10rem] h-[30rem] w-[30rem] rounded-full bg-blue-600/10 blur-3xl"></div>
  </div>

  <div class="relative mx-auto flex min-h-[calc(100svh-64px)] max-w-5xl items-center justify-center">
    <div
      class="relative w-full overflow-hidden rounded-[2rem] border border-white/10 bg-white/[0.045] p-8 text-center shadow-2xl shadow-black/25 backdrop-blur sm:p-10 lg:p-12">
      <div class="absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-cyan-300/40 to-transparent"></div>

      <span
        class="pointer-events-none absolute bottom-4 right-6 hidden text-8xl font-black leading-none text-white/[0.04] sm:block">
        WIP
      </span>

      <div
        class="relative z-10 mx-auto flex h-20 w-20 items-center justify-center rounded-3xl border border-cyan-300/20 bg-cyan-300/10 text-cyan-300 shadow-lg shadow-cyan-950/30 backdrop-blur">
        <mat-icon class="!h-10 !w-10 !text-[40px]"> construction </mat-icon>
      </div>

      <p class="relative z-10 mt-8 text-sm font-semibold uppercase tracking-[0.35em] text-cyan-300">Work in progress</p>

      <h2 class="relative z-10 mt-4 text-3xl font-bold tracking-tight text-white sm:text-4xl lg:text-5xl">
        {{ sectionName() }} is under construction
      </h2>

      <p class="relative z-10 mx-auto mt-6 max-w-2xl text-base leading-8 text-slate-300 sm:text-lg">
        I am still working on the {{ sectionName() }} section. More content will be added soon.
      </p>
    </div>
  </div>
</section>
