@if (selectable()) {
  <button mat-button type="button" [class]="chipClasses()" [disabled]="disabled()" (click)="select()">
    @if (icon()) {
      <mat-icon class="chip-button__icon" aria-hidden="true">{{ icon() }}</mat-icon>
    }

    <span class="chip-button__label">{{ label() }}</span>

    @if (badgeLabel()) {
      <span [class]="badgeClasses()">{{ badgeLabel() }}</span>
    }

    @if (metaLabel()) {
      <span class="chip-button__meta">{{ metaLabel() }}</span>
    }
  </button>
} @else {
  <span [class]="chipClasses()">
    @if (icon()) {
      <mat-icon class="chip-button__icon" aria-hidden="true">{{ icon() }}</mat-icon>
    }

    <span class="chip-button__label">{{ label() }}</span>

    @if (badgeLabel()) {
      <span [class]="badgeClasses()">{{ badgeLabel() }}</span>
    }

    @if (metaLabel()) {
      <span class="chip-button__meta">{{ metaLabel() }}</span>
    }
  </span>
}
