<mat-card class="contact-link-card__card" appearance="outlined">
  <mat-card-content class="contact-link-card__body">
    <button mat-button type="button" class="contact-link-card__content" (click)="openExternalUrl(link().href)">
      <span class="contact-link-card__label">{{ link().label }}</span>
      <span class="contact-link-card__value">
        {{ link().value }}
      </span>
    </button>

    <button
      mat-icon-button
      type="button"
      class="contact-link-card__action"
      [attr.aria-label]="`Copy ${link().label}`"
      (click)="copyRequested.emit(link())">
      <mat-icon class="contact-link-card__icon" aria-hidden="true">
        {{ isCopied() ? 'check' : 'content_copy' }}
      </mat-icon>
    </button>
  </mat-card-content>
</mat-card>
