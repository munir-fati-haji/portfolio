<section class="contact__section">
  <div class="contact__background">
    <div class="contact__glow-primary"></div>
    <div class="contact__glow-secondary"></div>
  </div>

  <div class="contact__content">
    <div>
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div class="contact__actions">
        <a href="mailto:munir.fati.haji@gmail.com" class="contact__email-action"> Send Email </a>
        <a href="#projects" class="contact__projects-action"> View Projects </a>
      </div>
    </div>

    <div class="contact__panel">
      <div class="contact__link-list">
        @for (link of contactLinks; track link.label) {
          <app-contact-link-card
            [link]="link"
            [isCopied]="copiedLabel() === link.label"
            (copyRequested)="copyContactValue($event)" />
        }
      </div>

      <div class="contact__note-card">
        <p class="contact__note-title">Based in Poland, working internationally.</p>
        <p class="contact__note-text">
          Best way to reach me is email. Share the problem, expected outcome, and any existing constraints so I can
          respond with useful next steps.
        </p>
      </div>
    </div>
  </div>
</section>
