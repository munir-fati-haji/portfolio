<section class="contact__section">
  <div class="contact__content">
    <header>
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <nav class="contact__actions" aria-label="Contact actions">
        <button mat-flat-button type="button" (click)="openExternalUrl('mailto:munir.fati.haji@gmail.com')">
          Send Email
        </button>
        <button mat-stroked-button type="button" routerLink="/projects">View Projects</button>
      </nav>
    </header>

    <aside class="contact__panel" aria-label="Contact links and availability">
      <section class="contact__link-list" aria-label="Contact links">
        @for (link of contactLinks; track link.label) {
          <app-contact-link-card
            [link]="link"
            [isCopied]="copiedLabel() === link.label"
            (copyRequested)="copyContactValue($event)" />
        }
      </section>

      <mat-card class="contact__note-card" appearance="outlined">
        <mat-card-content>
          <p class="contact__note-title">Based in Poland, working internationally.</p>
          <p class="contact__note-text">
            Best way to reach me is email. Share the problem, expected outcome, and any existing constraints so I can
            respond with useful next steps.
          </p>
        </mat-card-content>
      </mat-card>
    </aside>
  </div>
</section>
