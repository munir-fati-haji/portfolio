<section class="relative overflow-hidden bg-[#070b1a] px-4 py-24 text-white sm:px-6 lg:px-10 xl:px-12">
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute right-[-12rem] top-16 h-[32rem] w-[32rem] rounded-full bg-cyan-300/10 blur-3xl"></div>
    <div class="absolute bottom-0 left-[-8rem] h-[26rem] w-[26rem] rounded-full bg-blue-600/10 blur-3xl"></div>
  </div>

  <div
    class="relative mx-auto grid min-h-[calc(100svh-64px)] max-w-7xl items-center gap-10 lg:grid-cols-[0.95fr_1.05fr]">
    <div>
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div class="mt-8 flex flex-wrap gap-3">
        <a
          href="mailto:munir.fati.haji@gmail.com"
          class="inline-flex items-center justify-center rounded-full bg-cyan-300 px-6 py-3 text-sm font-bold text-slate-950 shadow-lg shadow-cyan-300/20 transition hover:bg-cyan-200">
          Send Email
        </a>
        <a
          href="#projects"
          class="inline-flex items-center justify-center rounded-full border border-white/10 bg-white/5 px-6 py-3 text-sm font-semibold text-white backdrop-blur transition hover:border-cyan-300/30 hover:bg-cyan-300/10 hover:text-cyan-100">
          View Projects
        </a>
      </div>
    </div>

    <div
      class="rounded-3xl border border-white/10 bg-white/[0.045] p-6 shadow-2xl shadow-black/25 backdrop-blur sm:p-8">
      <div class="grid gap-4">
        @for (link of contactLinks; track link.label) {
          <app-contact-link-card
            [link]="link"
            [isCopied]="copiedLabel() === link.label"
            (copyRequested)="copyContactValue($event)" />
        }
      </div>

      <div class="mt-6 rounded-2xl border border-cyan-300/20 bg-cyan-300/10 p-5">
        <p class="text-sm font-semibold text-cyan-100">Based in Poland, working internationally.</p>
        <p class="mt-2 text-sm leading-6 text-slate-300">
          Best way to reach me is email. Share the problem, expected outcome, and any existing constraints so I can
          respond with useful next steps.
        </p>
      </div>
    </div>
  </div>
</section>
