<section class="contact__style-1">
  <div class="contact__style-2">
    <div class="contact__style-3"></div>
    <div class="contact__style-4"></div>
  </div>

  <div class="contact__style-5">
    <div>
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div class="contact__style-6">
        <a href="mailto:munir.fati.haji@gmail.com" class="contact__style-7"> Send Email </a>
        <a href="#projects" class="contact__style-8"> View Projects </a>
      </div>
    </div>

    <div class="contact__style-9">
      <div class="contact__style-10">
        @for (link of contactLinks; track link.label) {
          <app-contact-link-card
            [link]="link"
            [isCopied]="copiedLabel() === link.label"
            (copyRequested)="copyContactValue($event)" />
        }
      </div>

      <div class="contact__style-11">
        <p class="contact__style-12">Based in Poland, working internationally.</p>
        <p class="contact__style-13">
          Best way to reach me is email. Share the problem, expected outcome, and any existing constraints so I can
          respond with useful next steps.
        </p>
      </div>
    </div>
  </div>
</section>
