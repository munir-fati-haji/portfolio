<mat-card class="experience-card__card" appearance="outlined">
  @if (experience().logoSrc) {
    <img class="experience-card__logo" alt="" [src]="experience().logoSrc" />
  } @else {
    <mat-icon class="experience-card__icon" aria-hidden="true">{{ experience().icon }}</mat-icon>
  }

  <header class="experience-card__top-row">
    <h3 class="experience-card__title">{{ experience().role }}</h3>
    <p class="experience-card__company">{{ experience().company }}</p>

    <button
      mat-icon-button
      type="button"
      class="experience-card__details"
      aria-label="Open experience details"
      (click)="openDetails()">
      <mat-icon aria-hidden="true">arrow_forward</mat-icon>
    </button>
  </header>

  <p class="experience-card__meta-row">
    <span class="experience-card__meta">
      <mat-icon aria-hidden="true">calendar_month</mat-icon>
      <span>{{ experience().period }}</span>
    </span>
    <span class="experience-card__meta">
      <mat-icon aria-hidden="true">location_on</mat-icon>
      <span>{{ experience().location }}</span>
    </span>
  </p>
</mat-card>
