<mat-card class="experience-card__card" appearance="outlined">
  <mat-card-header>
    <mat-icon mat-card-avatar aria-hidden="true">{{ experience().icon }}</mat-icon>
    <mat-card-title>{{ experience().role }}</mat-card-title>
    <mat-card-subtitle>{{ experience().company }} · {{ experience().period }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="experience-card__body">
    <p class="experience-card__description">
      {{ experience().summary }}
    </p>

    <mat-chip-set class="experience-card__skill-list" aria-label="Preview skills">
      @for (skill of experience().skills.slice(0, 4); track skill.name) {
        <mat-chip>
          <mat-icon matChipAvatar aria-hidden="true">{{ skill.icon }}</mat-icon>
          {{ skill.name }}
        </mat-chip>
      }
    </mat-chip-set>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button type="button" (click)="openDetails()">
      Open details
      <mat-icon aria-hidden="true">arrow_outward</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
