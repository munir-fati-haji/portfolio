<app-section-header class="experience__header" [eyebrow]="eyebrow" [title]="title" [description]="description" />

<div class="experience__metrics" aria-label="Career metrics">
  @for (metric of metrics; track metric.label) {
    <mat-card appearance="outlined">
      <mat-card-content class="experience__metric-content">
        <p class="experience__metric-value">{{ metric.value }}</p>
        <p class="experience__metric-label">{{ metric.label }}</p>
      </mat-card-content>
    </mat-card>
  }
</div>

<div class="experience__grid">
  @for (item of experiences; track item.role) {
    <app-experience-card class="experience__card" [experience]="item" />
  }
</div>
