<section id="experience" class="relative overflow-hidden bg-[#070b1a] px-4 py-24 text-white sm:px-6 lg:px-10 xl:px-12">
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-[-10rem] top-20 h-96 w-96 rounded-full bg-cyan-300/10 blur-3xl"></div>
    <div class="absolute right-[-12rem] top-1/3 h-[32rem] w-[32rem] rounded-full bg-blue-600/10 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/2 h-80 w-80 -translate-x-1/2 rounded-full bg-cyan-300/5 blur-3xl"></div>
  </div>

  <div class="relative mx-auto max-w-7xl">
    <div class="grid gap-10 lg:grid-cols-[1fr_0.9fr] lg:items-end">
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div class="grid gap-5 sm:grid-cols-2">
        @for (metric of metrics; track metric.label) {
          <div class="border-l border-cyan-300/30 pl-4">
            <p class="text-3xl font-black tracking-tight text-cyan-300">
              {{ metric.value }}
            </p>

            <p class="mt-1 text-sm leading-6 text-slate-400">
              {{ metric.label }}
            </p>
          </div>
        }
      </div>
    </div>

    <div class="mt-16 space-y-8">
      @for (experience of experiences; track experience.company; let index = $index) {
        <app-experience-card [experience]="experience" [index]="index" />
      }
    </div>
  </div>
</section>
