<section id="experience" class="experience__style-1">
  <div class="experience__style-2">
    <div class="experience__style-3"></div>
    <div class="experience__style-4"></div>
    <div class="experience__style-5"></div>
  </div>

  <div class="experience__style-6">
    <div class="experience__style-7">
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div class="experience__style-8">
        @for (metric of metrics; track metric.label) {
          <div class="experience__style-9">
            <p class="experience__style-10">
              {{ metric.value }}
            </p>

            <p class="experience__style-11">
              {{ metric.label }}
            </p>
          </div>
        }
      </div>
    </div>

    <div class="experience__style-12">
      @for (experience of experiences; track experience.company; let index = $index) {
        <app-experience-card [experience]="experience" [index]="index" />
      }
    </div>
  </div>
</section>
