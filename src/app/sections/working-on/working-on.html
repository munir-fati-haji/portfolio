<section class="working-on__style-1">
  <div class="working-on__style-2">
    <div class="working-on__style-3"></div>
  </div>

  <div class="working-on__style-4">
    <div class="working-on__style-5">
      <div>
        <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />
      </div>

      <div class="working-on__style-6">
        @for (area of focusAreas; track area) {
          <div class="working-on__style-7">
            <div class="working-on__style-8">
              <span class="working-on__style-9"> 0{{ $index + 1 }} </span>
              <p class="working-on__style-10">{{ area }}</p>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
