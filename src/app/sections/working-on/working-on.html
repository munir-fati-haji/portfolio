<app-section-header class="working-on__header" [eyebrow]="eyebrow" [title]="title" [description]="description" />

@for (area of focusAreas; track area) {
  <mat-card class="working-on__focus-card" appearance="outlined">
    <mat-card-content>
      <p class="working-on__focus-title">{{ area }}</p>
    </mat-card-content>
  </mat-card>
}
