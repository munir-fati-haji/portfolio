<section class="relative overflow-hidden bg-[#070b1a] px-4 py-24 text-white sm:px-6 lg:px-10 xl:px-12">
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-1/2 top-12 h-96 w-96 -translate-x-1/2 rounded-full bg-cyan-300/10 blur-3xl"></div>
  </div>

  <div class="relative mx-auto flex min-h-[calc(100svh-64px)] max-w-6xl items-center">
    <div class="grid w-full gap-8 lg:grid-cols-[0.9fr_1.1fr] lg:items-center">
      <div>
        <p class="text-sm font-semibold uppercase tracking-[0.35em] text-cyan-300">Now</p>
        <h2 class="mt-4 text-4xl font-bold tracking-tight text-white sm:text-5xl">What I am improving next</h2>
        <p class="mt-6 text-base leading-8 text-slate-300 sm:text-lg">
          This section keeps the portfolio current without turning it into a placeholder. It shows the direction of my
          practice and the kind of engineering habits I am sharpening.
        </p>
      </div>

      <div class="space-y-4">
        @for (area of focusAreas; track area) {
          <div class="rounded-3xl border border-white/10 bg-white/[0.045] p-5 shadow-xl shadow-black/20 backdrop-blur">
            <div class="flex gap-4">
              <span
                class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full border border-cyan-300/20 bg-cyan-300/10 text-sm font-bold text-cyan-200">
                0{{ $index + 1 }}
              </span>
              <p class="text-sm leading-7 text-slate-300 sm:text-base">{{ area }}</p>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
