<mat-card class="certificate-card__card" appearance="outlined">
  <mat-card-header>
    <mat-icon mat-card-avatar aria-hidden="true">{{ certificate().icon }}</mat-icon>
    <mat-card-title>{{ certificate().school }}</mat-card-title>
    <mat-card-subtitle>{{ certificate().title }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="certificate-card__body">
    <p class="certificate-card__period">{{ certificate().location }} - {{ certificate().period }}</p>

    <mat-chip-set class="certificate-card__skill-list" aria-label="Certificate items">
      @for (skill of certificate().skills; track skill) {
        <mat-chip>{{ skill }}</mat-chip>
      }
    </mat-chip-set>
  </mat-card-content>
</mat-card>
