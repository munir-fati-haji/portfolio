<mat-card class="certificate-card__card" appearance="outlined">
  <mat-card-header>
    <mat-icon mat-card-avatar aria-hidden="true">{{ certificate().icon }}</mat-icon>
    <mat-card-title>{{ certificate().school }}</mat-card-title>
    <mat-card-subtitle>{{ certificate().title }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="certificate-card__meta-row">
    <span class="certificate-card__meta">
      <mat-icon aria-hidden="true">workspace_premium</mat-icon>
      <span>{{ certificate().skills[0] }}</span>
    </span>
    <span class="certificate-card__meta">
      <mat-icon aria-hidden="true">calendar_month</mat-icon>
      <span>{{ certificate().period }}</span>
    </span>
    <span class="certificate-card__meta">
      <mat-icon aria-hidden="true">location_on</mat-icon>
      <span>{{ certificate().location }}</span>
    </span>
  </mat-card-content>
</mat-card>
