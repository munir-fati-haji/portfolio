<mat-card class="education-card__card" appearance="outlined">
  <mat-card-header>
    <mat-icon mat-card-avatar aria-hidden="true">{{ education().icon }}</mat-icon>
    <mat-card-title>{{ education().degree }}</mat-card-title>
    <mat-card-subtitle>{{ education().school }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="education-card__meta-row">
    <span class="education-card__meta">
      <mat-icon aria-hidden="true">calendar_month</mat-icon>
      <span>{{ education().period }}</span>
    </span>
    <span class="education-card__meta">
      <mat-icon aria-hidden="true">location_on</mat-icon>
      <span>{{ education().location }}</span>
    </span>
    <button
      mat-icon-button
      type="button"
      class="education-card__details"
      aria-label="Open education details"
      (click)="openDetails()">
      <mat-icon aria-hidden="true">arrow_forward</mat-icon>
    </button>
  </mat-card-content>
</mat-card>
