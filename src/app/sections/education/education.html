<section id="education" class="education__section">
  <div class="education__content">
    <div class="education__header-row">
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div>
        <div class="education__stats-grid">
          <div class="education__degree-stat">
            <p class="education__degree-value">2</p>
            <p class="education__degree-label">Academic degrees completed</p>
          </div>

          <div class="education__certificate-stat">
            <p class="education__certificate-value">2</p>
            <p class="education__certificate-label">Language preparation certificates</p>
          </div>
        </div>

        <a
          mat-stroked-button
          class="education__ambassador-link"
          target="_blank"
          rel="noreferrer"
          [href]="ambassadorProfileUrl">
          Open Official WUT Ambassador Profile
          <mat-icon class="education__external-icon" aria-hidden="true">open_in_new</mat-icon>
        </a>
      </div>
    </div>

    <div class="education__timeline">
      @for (education of educationItems; track education.degree) {
        <app-education-card [education]="education" [index]="$index" />
      }
    </div>

    <div class="education__certificates-section">
      <div class="education__certificates-heading">
        <div class="education__heading-line-start"></div>
        <p class="education__heading-title">Language Certificates</p>
        <div class="education__heading-line-end"></div>
      </div>

      <div class="education__certificate-grid">
        @for (certificate of certificates; track certificate.school) {
          <app-certificate-card [certificate]="certificate" />
        }
      </div>
    </div>
  </div>
</section>
