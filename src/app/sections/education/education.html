<app-section-header class="education__header" [eyebrow]="eyebrow" [title]="title" [description]="description" />

<mat-card class="education__stat-card education__stat-card--degrees" appearance="outlined">
  <mat-card-content>
    <p class="education__stat-value">2</p>
    <p class="education__stat-label">Academic degrees completed</p>
  </mat-card-content>
</mat-card>

<mat-card class="education__stat-card education__stat-card--certificates" appearance="outlined">
  <mat-card-content>
    <p class="education__stat-value">2</p>
    <p class="education__stat-label">Language preparation certificates</p>
  </mat-card-content>
</mat-card>

<button
  mat-stroked-button
  type="button"
  class="education__ambassador-link"
  (click)="openExternalUrl(ambassadorProfileUrl)">
  Open Official WUT Ambassador Profile
  <mat-icon class="education__external-icon" aria-hidden="true">open_in_new</mat-icon>
</button>

@for (education of educationItems; track education.degree) {
  <app-education-card class="education__item" [education]="education" />
}

<p id="education-certificates-title" class="education__heading-title">Language Certificates</p>

@for (certificate of certificates; track certificate.school) {
  <app-certificate-card class="education__certificate" [certificate]="certificate" />
}
