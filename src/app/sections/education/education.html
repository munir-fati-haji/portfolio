<section id="education" class="education__style-1">
  <div class="education__style-2">
    <div class="education__style-3"></div>
    <div class="education__style-4"></div>
    <div class="education__style-5"></div>
  </div>

  <div class="education__style-6">
    <div class="education__style-7">
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div>
        <div class="education__style-8">
          <div class="education__style-9">
            <p class="education__style-10">2</p>
            <p class="education__style-11">Academic degrees completed</p>
          </div>

          <div class="education__style-12">
            <p class="education__style-13">2</p>
            <p class="education__style-14">Language preparation certificates</p>
          </div>
        </div>

        <a class="education__style-15" target="_blank" rel="noreferrer" [href]="ambassadorProfileUrl">
          Open Official WUT Ambassador Profile
          <span class="education__style-16" aria-hidden="true">↗</span>
        </a>
      </div>
    </div>

    <div class="education__style-17">
      @for (education of educationItems; track education.degree; let index = $index) {
        <app-education-card [education]="education" [index]="index" />
      }
    </div>

    <div class="education__style-18">
      <div class="education__style-19">
        <div class="education__style-20"></div>
        <p class="education__style-21">Language Certificates</p>
        <div class="education__style-22"></div>
      </div>

      <div class="education__style-23">
        @for (certificate of certificates; track certificate.school) {
          <app-certificate-card [certificate]="certificate" />
        }
      </div>
    </div>
  </div>
</section>
