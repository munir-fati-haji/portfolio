@for (stat of stats(); track stat.label) {
  <mat-card class="hero-stats__stat-card" appearance="outlined">
    <mat-card-content>
      <p class="hero-stats__value">
        {{ stat.value }}
      </p>

      <p class="hero-stats__label">
        {{ stat.label }}
      </p>
    </mat-card-content>
  </mat-card>
}
