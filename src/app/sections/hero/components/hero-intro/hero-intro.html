<div class="hero-intro__content">
  <p class="hero-intro__eyebrow">Portfolio</p>

  <h1 class="hero-intro__title">
    Hi, I'm
    <span class="hero-intro__name">
      {{ name() }}
    </span>
  </h1>

  <h2 class="hero-intro__role">
    {{ role() }}
  </h2>

  <p class="hero-intro__description">
    {{ description() }}
  </p>

  <app-hero-skills [groups]="skills()" />

  <div class="hero-intro__actions">
    <a mat-flat-button routerLink="/projects" class="hero-intro__primary-action"> View Projects </a>

    <a mat-stroked-button routerLink="/contact" class="app-secondary-action hero-intro__secondary-action">
      Contact Me
    </a>
  </div>
</div>
