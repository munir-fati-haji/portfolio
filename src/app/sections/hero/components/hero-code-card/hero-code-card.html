<div class="min-w-0 overflow-hidden rounded-2xl border border-white/10 bg-[#10172a] shadow-xl">
  <div class="flex items-center gap-3 border-b border-white/10 bg-white/3 px-4 py-3 sm:px-6">
    @for (action of windowActions; track action.label) {
      <span class="h-3 w-3 rounded-full" [class]="action.className" [attr.aria-label]="action.label"> </span>
    }
  </div>

  <div class="p-4 sm:p-6">
    <pre
      class="max-w-full overflow-x-auto rounded-xl text-xs leading-6 sm:text-sm sm:leading-7"><code language="typescript" [highlight]="code()"></code></pre>
  </div>
</div>
