<section id="hero" class="flex min-h-[calc(100svh-64px)] overflow-x-hidden bg-[#070b1a] text-white">
  <div
    class="mx-auto grid w-full max-w-7xl grid-cols-1 items-center gap-10 px-4 py-10 sm:px-6 lg:grid-cols-[1.15fr_0.85fr] lg:gap-12 lg:px-10 lg:py-12 xl:px-12">
    <app-hero-intro class="min-w-0" [name]="name" [role]="role" [description]="description" [skills]="skills" />

    <div
      class="min-w-0 w-full rounded-3xl border border-white/10 bg-white/5 p-3 shadow-2xl backdrop-blur sm:rounded-4xl sm:p-5 xl:p-6">
      <app-hero-code-card [code]="codeSnippet" />

      <app-hero-stats [stats]="stats" />
    </div>
  </div>
</section>
