<article class="group about-highlight-card__card">
  <div class="about-highlight-card__shine">
    <div class="about-highlight-card__icon-surface">
      <mat-icon>{{ highlight().icon }}</mat-icon>
    </div>

    <div class="about-highlight-card__icon">
      <h3 class="about-highlight-card__content">
        {{ highlight().title }}
      </h3>

      <p class="about-highlight-card__title">
        {{ highlight().description }}
      </p>
    </div>
  </div>
</article>
