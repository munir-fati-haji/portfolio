<article
  class="group rounded-2xl border border-white/10 bg-slate-900/70 p-5 text-white transition hover:border-cyan-300/40 hover:bg-slate-900/90">
  <div class="flex gap-4">
    <div
      class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl border border-cyan-300/20 bg-cyan-300/10 text-cyan-300 shadow-lg shadow-cyan-950/30 backdrop-blur transition group-hover:scale-105 group-hover:bg-cyan-300/15">
      <mat-icon>{{ highlight().icon }}</mat-icon>
    </div>

    <div class="min-w-0">
      <h3 class="font-semibold text-white">
        {{ highlight().title }}
      </h3>

      <p class="mt-2 text-sm leading-6 text-slate-400">
        {{ highlight().description }}
      </p>
    </div>
  </div>
</article>
