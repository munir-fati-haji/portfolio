<article class="group about-highlight-card__style-1">
  <div class="about-highlight-card__style-2">
    <div class="about-highlight-card__style-3">
      <mat-icon>{{ highlight().icon }}</mat-icon>
    </div>

    <div class="about-highlight-card__style-4">
      <h3 class="about-highlight-card__style-5">
        {{ highlight().title }}
      </h3>

      <p class="about-highlight-card__style-6">
        {{ highlight().description }}
      </p>
    </div>
  </div>
</article>
