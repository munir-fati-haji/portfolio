<section class="relative overflow-hidden bg-[#070b1a] px-4 py-24 text-white sm:px-6 lg:px-10 xl:px-12">
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute right-[-8rem] top-20 h-[28rem] w-[28rem] rounded-full bg-cyan-300/10 blur-3xl"></div>
    <div class="absolute bottom-0 left-[-8rem] h-[28rem] w-[28rem] rounded-full bg-blue-600/10 blur-3xl"></div>
  </div>

  <div class="relative mx-auto flex min-h-[calc(100svh-64px)] max-w-7xl items-center">
    <div class="grid w-full gap-8 lg:grid-cols-[1fr_1fr] lg:items-center">
      <div>
        <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />
      </div>

      <div
        class="rounded-3xl border border-white/10 bg-white/[0.045] p-6 shadow-2xl shadow-black/25 backdrop-blur sm:p-8">
        <div class="space-y-5">
          @for (step of steps; track step) {
            <div class="rounded-2xl border border-white/10 bg-white/5 p-5">
              <p class="text-xs font-semibold uppercase tracking-[0.25em] text-cyan-300">Step 0{{ $index + 1 }}</p>
              <p class="mt-3 text-sm leading-7 text-slate-300 sm:text-base">{{ step }}</p>
            </div>
          }
        </div>

        <div class="mt-6 rounded-2xl border border-cyan-300/20 bg-cyan-300/10 p-5">
          <p class="text-sm font-semibold text-cyan-100">Result</p>
          <p class="mt-2 text-sm leading-6 text-slate-300">
            The goal is always the same: a maintainable solution that is easier to understand, operate, and improve than
            the process it replaces.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
