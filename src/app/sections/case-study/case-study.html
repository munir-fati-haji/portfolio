<section class="case-study__section">
  <app-section-header class="case-study__header" [eyebrow]="eyebrow" [title]="title" [description]="description" />

  <mat-stepper orientation="vertical" class="case-study__stepper">
    @for (step of steps; track step) {
      <mat-step>
        <ng-template matStepLabel>Step {{ $index + 1 }}</ng-template>
        <p class="case-study__step-text">{{ step }}</p>
      </mat-step>
    }
  </mat-stepper>

  <mat-card class="case-study__result-card" appearance="outlined">
    <mat-card-content>
      <p class="case-study__result-label">Result</p>
      <p class="case-study__result-text">
        The goal is always the same: a maintainable solution that is easier to understand, operate, and improve than the
        process it replaces.
      </p>
    </mat-card-content>
  </mat-card>
</section>
