<section class="case-study__section">
  <div class="case-study__content">
    <div class="case-study__layout">
      <div>
        <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />
      </div>

      <div class="case-study__panel">
        <div class="case-study__step-list">
          @for (step of steps; track step) {
            <mat-card class="case-study__step-card" appearance="outlined">
              <mat-card-content>
                <p class="case-study__step-text">{{ step }}</p>
              </mat-card-content>
            </mat-card>
          }
        </div>

        <mat-card class="case-study__result-card" appearance="outlined">
          <mat-card-content>
            <p class="case-study__result-label">Result</p>
            <p class="case-study__result-text">
              The goal is always the same: a maintainable solution that is easier to understand, operate, and improve
              than the process it replaces.
            </p>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</section>
