<section class="case-study__style-1">
  <div class="case-study__style-2">
    <div class="case-study__style-3"></div>
    <div class="case-study__style-4"></div>
  </div>

  <div class="case-study__style-5">
    <div class="case-study__style-6">
      <div>
        <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />
      </div>

      <div class="case-study__style-7">
        <div class="case-study__style-8">
          @for (step of steps; track step) {
            <div class="case-study__style-9">
              <p class="case-study__style-10">Step 0{{ $index + 1 }}</p>
              <p class="case-study__style-11">{{ step }}</p>
            </div>
          }
        </div>

        <div class="case-study__style-12">
          <p class="case-study__style-13">Result</p>
          <p class="case-study__style-14">
            The goal is always the same: a maintainable solution that is easier to understand, operate, and improve than
            the process it replaces.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
