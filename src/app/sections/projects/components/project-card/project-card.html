<article
  class="group relative overflow-hidden rounded-3xl border border-white/10 bg-white/[0.045] p-6 shadow-2xl shadow-black/25 backdrop-blur transition hover:border-cyan-300/25 hover:bg-white/[0.065] sm:p-8">
  <div class="absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-cyan-300/40 to-transparent"></div>

  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.28em] text-cyan-300">{{ project().type }}</p>
      <h3 class="mt-3 text-2xl font-bold text-white">{{ project().title }}</h3>
    </div>
    <span class="rounded-full border border-cyan-300/20 bg-cyan-300/10 px-3 py-1 text-xs font-semibold text-cyan-200">
      Featured
    </span>
  </div>

  <p class="mt-5 text-sm leading-7 text-slate-300 sm:text-base">{{ project().description }}</p>

  <ul class="mt-6 space-y-3">
    @for (item of project().impact; track item) {
      <li class="flex gap-3 text-sm leading-6 text-slate-300">
        <span class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full bg-cyan-300 shadow-[0_0_16px_rgba(103,232,249,0.65)]"></span>
        <span>{{ item }}</span>
      </li>
    }
  </ul>

  <div class="mt-7 flex flex-wrap gap-2">
    @for (item of project().stack; track item) {
      <span class="rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs font-medium text-slate-300">
        {{ item }}
      </span>
    }
  </div>
</article>
