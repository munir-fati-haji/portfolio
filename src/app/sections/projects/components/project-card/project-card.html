<article class="group project-card__style-1">
  <div class="project-card__style-2"></div>

  <div class="project-card__style-3">
    <div>
      <p class="project-card__style-4">{{ project().type }}</p>
      <h3 class="project-card__style-5">{{ project().title }}</h3>
    </div>
    <app-shared-chip-button size="xs" variant="cyan" label="Featured" />
  </div>

  <p class="project-card__style-6">{{ project().description }}</p>

  <ul class="project-card__style-7">
    @for (item of project().impact; track item) {
      <li class="project-card__style-8">
        <span class="project-card__style-9"></span>
        <span>{{ item }}</span>
      </li>
    }
  </ul>

  <div class="project-card__style-10">
    @for (item of project().stack; track item) {
      <app-shared-chip-button size="xs" variant="slate" [label]="item" />
    }
  </div>
</article>
