<mat-card class="project-card__card" appearance="outlined">
  <mat-icon class="project-card__icon" aria-hidden="true">{{ project().icon }}</mat-icon>

  <header class="project-card__top-row">
    <h3 class="project-card__title">{{ project().title }}</h3>
    <p class="project-card__type">{{ project().type }}</p>

    <button
      mat-icon-button
      type="button"
      class="project-card__action"
      aria-label="Open project details"
      (click)="openDetails()">
      <mat-icon aria-hidden="true">arrow_forward</mat-icon>
    </button>
  </header>

  <mat-card-content class="project-card__content">
    <p class="project-card__description">{{ project().description }}</p>

    <mat-chip-set class="project-card__tech-list" aria-label="Project stack preview">
      @for (item of project().stack.slice(0, 4); track item) {
        <mat-chip>{{ item }}</mat-chip>
      }
    </mat-chip-set>
  </mat-card-content>
</mat-card>
