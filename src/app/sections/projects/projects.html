<section class="relative overflow-hidden bg-[#070b1a] px-4 py-24 text-white sm:px-6 lg:px-10 xl:px-12">
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-[-10rem] top-20 h-[28rem] w-[28rem] rounded-full bg-cyan-300/10 blur-3xl"></div>
    <div class="absolute bottom-0 right-[-8rem] h-[30rem] w-[30rem] rounded-full bg-blue-600/10 blur-3xl"></div>
  </div>

  <div class="relative mx-auto flex min-h-[calc(100svh-64px)] max-w-7xl flex-col justify-center">
    <div class="max-w-3xl">
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />
    </div>

    <div class="mt-12 grid gap-6 lg:grid-cols-2">
      @for (project of projects; track project.title) {
        <app-project-card [project]="project" />
      }
    </div>
  </div>
</section>
