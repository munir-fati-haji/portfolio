<section class="projects__style-1">
  <div class="projects__style-2">
    <div class="projects__style-3"></div>
    <div class="projects__style-4"></div>
  </div>

  <div class="projects__style-5">
    <div class="projects__style-6">
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />
    </div>

    <div class="projects__style-7">
      @for (project of projects; track project.title) {
        <app-project-card [project]="project" />
      }
    </div>
  </div>
</section>
