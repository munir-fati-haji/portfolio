<article
  class="group relative overflow-hidden rounded-[2rem] border border-white/10 bg-white/[0.045] p-5 shadow-2xl shadow-black/25 backdrop-blur transition hover:border-cyan-300/30 hover:bg-white/[0.065] sm:p-7">
  <div class="absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-cyan-300/40 to-transparent"></div>

  <span
    class="pointer-events-none absolute bottom-4 right-6 hidden text-7xl font-black leading-none text-white/[0.04] sm:block">
    0{{ index() + 1 }}
  </span>

  <div class="relative z-10 flex items-start gap-4">
    <div
      class="flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl border border-cyan-300/20 bg-cyan-300/10 text-cyan-300 shadow-lg shadow-cyan-950/30 backdrop-blur">
      <mat-icon>{{ category().icon }}</mat-icon>
    </div>

    <div class="min-w-0">
      <h3 class="text-2xl font-bold tracking-tight text-white">
        {{ category().title }}
      </h3>

      <p class="mt-2 text-sm leading-6 text-slate-400">
        {{ category().description }}
      </p>
    </div>
  </div>

  <div class="relative z-10 mt-7 flex flex-wrap gap-2">
    @for (skill of category().skills; track skill.name) {
      <app-shared-chip-button
        size="sm"
        [icon]="skill.icon"
        [label]="skill.name"
        [badgeLabel]="skill.level"
        [metaLabel]="skill.experience"
        [variant]="
          skill.level === 'Advanced'
            ? 'cyan'
            : skill.level === 'Strong'
              ? 'emerald'
              : skill.level === 'Practical'
                ? 'amber'
                : 'slate'
        " />
    }
  </div>
</article>
