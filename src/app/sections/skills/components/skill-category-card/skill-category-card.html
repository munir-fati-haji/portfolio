<article class="group skill-category-card__style-1">
  <div class="skill-category-card__style-2"></div>

  <span class="skill-category-card__style-3"> 0{{ index() + 1 }} </span>

  <div class="skill-category-card__style-4">
    <div class="skill-category-card__style-5">
      <mat-icon>{{ category().icon }}</mat-icon>
    </div>

    <div class="skill-category-card__style-6">
      <h3 class="skill-category-card__style-7">
        {{ category().title }}
      </h3>

      <p class="skill-category-card__style-8">
        {{ category().description }}
      </p>
    </div>
  </div>

  <div class="skill-category-card__style-9">
    @for (skill of category().skills; track skill.name) {
      <app-shared-chip-button
        size="sm"
        [icon]="skill.icon"
        [label]="skill.name"
        [badgeLabel]="skill.level"
        [metaLabel]="skill.experience"
        [variant]="
          skill.level === 'Advanced'
            ? 'cyan'
            : skill.level === 'Strong'
              ? 'emerald'
              : skill.level === 'Practical'
                ? 'amber'
                : 'slate'
        " />
    }
  </div>
</article>
