<mat-card class="group skill-category-card__card" appearance="outlined">
  <div class="skill-category-card__shine"></div>

  <mat-card-content class="skill-category-card__body">
    <div class="skill-category-card__header">
      <div class="skill-category-card__icon-surface">
        <mat-icon>{{ category().icon }}</mat-icon>
      </div>

      <div class="skill-category-card__content">
        <h3 class="skill-category-card__title">
          {{ category().title }}
        </h3>

        <p class="skill-category-card__description">
          {{ category().description }}
        </p>
      </div>
    </div>

    <div class="skill-category-card__skill-list">
      @for (skill of category().skills; track skill.name) {
        <app-shared-chip-button
          size="sm"
          [icon]="skill.icon"
          [label]="skill.name"
          [badgeLabel]="skill.level"
          [metaLabel]="skill.experience"
          [variant]="skill.level | skillLevelVariant" />
      }
    </div>
  </mat-card-content>
</mat-card>
