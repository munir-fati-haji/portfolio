<mat-card class="skill-category-card__card" appearance="outlined">
  <mat-card-header>
    <mat-icon mat-card-avatar aria-hidden="true">{{ category().icon }}</mat-icon>
    <mat-card-title>{{ category().title }}</mat-card-title>
    <mat-card-subtitle>{{ category().description }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="skill-category-card__body">
    <mat-chip-set class="skill-category-card__skill-list" aria-label="Skills">
      @for (skill of category().skills; track skill.name) {
        <mat-chip>
          <mat-icon matChipAvatar aria-hidden="true">{{ skill.icon }}</mat-icon>
          {{ skill.name }} - {{ skill.level }} - {{ skill.experience }}
        </mat-chip>
      }
    </mat-chip-set>
  </mat-card-content>
</mat-card>
