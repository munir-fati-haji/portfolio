<mat-card class="skill-category-card__card" appearance="outlined">
  <mat-card-header>
    <mat-icon mat-card-avatar aria-hidden="true">{{ category().icon }}</mat-icon>
    <mat-card-title>{{ category().title }}</mat-card-title>
    <mat-card-subtitle>{{ category().description }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-actions align="end">
    <button
      mat-icon-button
      type="button"
      class="skill-category-card__action"
      aria-label="Open skill details"
      (click)="openDetails()">
      <mat-icon aria-hidden="true">arrow_forward</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
