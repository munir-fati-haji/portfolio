<app-section-header class="skills__header" [eyebrow]="eyebrow" [title]="title" [description]="description" />

@for (stat of stats; track stat.label) {
  <mat-card class="skills__stat-card" appearance="outlined">
    <mat-card-content>
      <p class="skills__stat-value">{{ stat.value }}</p>
      <p class="skills__stat-label">{{ stat.label }}</p>
    </mat-card-content>
  </mat-card>
}

<mat-chip-set class="skills__legend" aria-label="Skill levels">
  <mat-chip>Advanced</mat-chip>
  <mat-chip>Strong</mat-chip>
  <mat-chip>Practical</mat-chip>
  <mat-chip>Basic</mat-chip>
</mat-chip-set>

@for (category of categories; track category.title) {
  <app-skill-category-card [category]="category" />
}
