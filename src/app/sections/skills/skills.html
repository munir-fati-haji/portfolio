<section id="skills" class="skills__style-1">
  <div class="skills__style-2">
    <div class="skills__style-3"></div>
    <div class="skills__style-4"></div>
    <div class="skills__style-5"></div>
  </div>

  <div class="skills__style-6">
    <div class="skills__style-7">
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div class="skills__style-8">
        @for (stat of stats; track stat.label) {
          <div class="skills__style-9">
            <p class="skills__style-10">
              {{ stat.value }}
            </p>

            <p class="skills__style-11">
              {{ stat.label }}
            </p>
          </div>
        }
      </div>
    </div>

    <div class="skills__style-12">
      <app-shared-chip-button size="sm" variant="cyan" label="Advanced" />
      <app-shared-chip-button size="sm" variant="emerald" label="Strong" />
      <app-shared-chip-button size="sm" variant="amber" label="Practical" />
      <app-shared-chip-button size="sm" variant="slate" label="Basic" />
    </div>

    <div class="skills__style-13">
      @for (category of categories; track category.title; let index = $index) {
        <app-skill-category-card [category]="category" [index]="index" />
      }
    </div>
  </div>
</section>
