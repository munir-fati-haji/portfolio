<section id="skills" class="relative overflow-hidden bg-[#070b1a] px-4 py-24 text-white sm:px-6 lg:px-10 xl:px-12">
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-[-10rem] top-20 h-96 w-96 rounded-full bg-cyan-300/10 blur-3xl"></div>
    <div class="absolute right-[-12rem] top-1/3 h-[32rem] w-[32rem] rounded-full bg-blue-600/10 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/2 h-80 w-80 -translate-x-1/2 rounded-full bg-cyan-300/5 blur-3xl"></div>
  </div>

  <div class="relative mx-auto max-w-7xl">
    <div class="grid gap-10 lg:grid-cols-[1fr_0.9fr] lg:items-end">
      <app-section-header [eyebrow]="eyebrow" [title]="title" [description]="description" />

      <div class="grid gap-5 sm:grid-cols-2">
        @for (stat of stats; track stat.label) {
          <div class="border-l border-cyan-300/30 pl-4">
            <p class="text-2xl font-black tracking-tight text-cyan-300 sm:text-3xl">
              {{ stat.value }}
            </p>

            <p class="mt-1 text-sm leading-6 text-slate-400">
              {{ stat.label }}
            </p>
          </div>
        }
      </div>
    </div>

    <div class="mt-12 flex flex-wrap gap-3">
      <span
        class="inline-flex items-center gap-2 rounded-full border border-cyan-300/30 bg-cyan-300/15 px-3 py-1.5 text-xs font-semibold text-cyan-100">
        <span class="h-2 w-2 rounded-full bg-cyan-300"></span>
        Advanced
      </span>

      <span
        class="inline-flex items-center gap-2 rounded-full border border-emerald-300/25 bg-emerald-300/10 px-3 py-1.5 text-xs font-semibold text-emerald-100">
        <span class="h-2 w-2 rounded-full bg-emerald-300"></span>
        Strong
      </span>

      <span
        class="inline-flex items-center gap-2 rounded-full border border-amber-300/30 bg-amber-300/10 px-3 py-1.5 text-xs font-semibold text-amber-100">
        <span class="h-2 w-2 rounded-full bg-amber-300"></span>
        Practical
      </span>

      <span
        class="inline-flex items-center gap-2 rounded-full border border-slate-300/15 bg-white/5 px-3 py-1.5 text-xs font-semibold text-slate-300">
        <span class="h-2 w-2 rounded-full bg-slate-300"></span>
        Basic
      </span>
    </div>

    <div class="mt-10 grid gap-8 lg:grid-cols-2">
      @for (category of categories; track category.title; let index = $index) {
        <app-skill-category-card [category]="category" [index]="index" />
      }
    </div>
  </div>
</section>
